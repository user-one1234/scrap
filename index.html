            font-size: 2.8rem;

            gap: 24px;
            margin-bottom: 32px;

            border-radius: 28px;

            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 5px solid #2c7da0;
            color: #1f3a4b;

            width: 100%;
            height: 360px;
        }
        .full-width {

            yAxis: { type: 'value', name: '报废率 (%)', axisLabel: { formatter: '{value}%' } },
            series: [
                { name: '实际报废率 %', type: 'bar', data: actualRates, itemStyle: { borderRadius: [6,6,0,0], color: '#e67e22' }, label: { show: true, position: 'top', formatter:'{c}%' } },
                { name: '目标控制率 %', type: 'line', data: targetRates, lineStyle: { width: 3, color: '#2c7da0', type: 'dashed' }, symbol: 'circle', symbolSize: 8, label: { show: true, position: 'top' } }
            ]
        });
    }

    // 报废金额排行 (万元)
    function initAmountChart() {
        const chart = echarts.init(document.getElementById('chart-amount'));
        const data = productsData.map(p => ({ name: p.name, value: p.实际报废金额 / 10000 }));
        data.sort((a,b)=> b.value - a.value);
        chart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, valueFormatter: (v) => v.toFixed(2) + ' 万元' },
            xAxis: { type: 'value', name: '报废金额 (万元)' },
            yAxis: { type: 'category', data: data.map(d=>d.name), axisLabel: { fontWeight:500 } },
            series: [{ type: 'bar', data: data.map(d=>d.value), itemStyle: { borderRadius: [0,8,8,0], color: '#3b8db0', label: { show: true, position: 'right', formatter: '{c} 万元' } } }]
        });
    }

    // 缺陷占比圆环 (根据各产品主要缺陷金额累加, 展示前8项)
    function initDefectDonut() {
        const defectMap = new Map();
        const defectNames = ['前道','碰伤','来料','主/扁未焊合','钎焊','其它','变形','翅片掉带','检测','火焰焊','呛管','错漏装'];
        const keyMap = ['前道金额','碰伤金额','来料金额','主扁未焊合金额','钎焊金额','其它金额','变形金额','翅片掉带金额','检测金额','火焰焊金额','呛管金额','错漏装金额'];
        // 初始化
        defectNames.forEach((name,idx) => defectMap.set(name, 0));
        productsData.forEach(product => {
            defectNames.forEach((name,idx) => {
                const amountKey = keyMap[idx];
                let val = product.缺陷[amountKey] || 0;
                defectMap.set(name, defectMap.get(name) + val);
            });
        });
        const chartData = Array.from(defectMap.entries()).map(([n,v]) => ({ name: n, value: v })).filter(d=>d.value>0).sort((a,b)=>b.value-a.value).slice(0,8);
        const chart = echarts.init(document.getElementById('chart-defect'));
        chart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c}元 ({d}%)' },
            legend: { orient: 'vertical', left: 'left', top: 'center', textStyle: { fontSize: 11 } },
            series: [{
                type: 'pie', radius: ['45%','70%'], avoidLabelOverlap: false,
                label: { show: true, formatter: '{b}', position: 'outside' },
                emphasis: { scale: true },
                data: chartData.map(item => ({ name: item.name, value: item.value, itemStyle: { borderRadius: 8 } })),
                color: ['#5470c6','#fac858','#ee6666','#73c0de','#3ba272','#fc8452','#9a60b4','#ea7ccc']
            }]
        });
    }

    // 生成详细表格 (含缺陷金额比例字符串)
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        productsData.forEach(p => {
            const def = p.缺陷;
            const formatMoney = (val) => val.toFixed(0);
            const formatPct = (val) => (val*100).toFixed(1)+'%';
            const row = `<tr>
                <td class="product-category">${p.name}</td>
                <td>${p.实际报废金额.toFixed(0)}</td>
                <td class="${p.实际报废率 > p.目标报废率 ? 'defect-highlight' : ''}">${(p.实际报废率*100).toFixed(2)}%</td>
                <td>${(p.目标报废率*100).toFixed(1)}%</td>
                <td>${formatMoney(def.前道金额||0)} (${formatPct(def.前道比例||0)})</td>
                <td>${formatMoney(def.碰伤金额||0)} (${formatPct(def.碰伤比例||0)})</td>
                <td>${formatMoney(def.来料金额||0)} (${formatPct(def.来料比例||0)})</td>
                <td>${formatMoney(def.主扁未焊合金额||0)} (${formatPct(def.主扁未焊合比例||0)})</td>
                <td>${formatMoney(def.钎焊金额||0)} (${formatPct(def.钎焊比例||0)})</td>
                <td>${formatMoney(def.其它金额||0)} (${formatPct(def.其它比例||0)})</td>
                <td>${formatMoney(def.变形金额||0)} (${formatPct(def.变形比例||0)})</td>
                <td>${formatMoney(def.翅片掉带金额||0)} (${formatPct(def.翅片掉带比例||0)})</td>
                <td>${formatMoney(def.检测金额||0)} (${formatPct(def.检测比例||0)})</td>
                <td>${formatMoney(def.火焰焊金额||0)} (${formatPct(def.火焰焊比例||0)})</td>
                <td>${formatMoney(def.呛管金额||0)} (${formatPct(def.呛管比例||0)})</td>
                <td>${formatMoney(def.错漏装金额||0)} (${formatPct(def.错漏装比例||0)})</td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        });
        // 合计行加入汇总数据
        let totalDefects = {};
        productsData.forEach(p => {
            Object.keys(p.缺陷).forEach(k => { if(typeof p.缺陷[k]==='number') totalDefects[k] = (totalDefects[k]||0)+p.缺陷[k]; });
        });
        const totalRowHtml = `<tr style="background:#f1f5f9; font-weight:800;"><td style="text-align:left;">合计/平均</td>
            <td>${totalRow.实际报废总额.toFixed(0)}</td><td>${(totalRow.总报废率*100).toFixed(2)}%</td><td>${(totalRow.目标均线*100).toFixed(1)}%</td>
            ${defectKeys().map(k => `<td>${(totalDefects[k]||0).toFixed(0)}</td>`).join('')}
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', totalRowHtml);
        function defectKeys() { return ['前道金额','碰伤金额','来料金额','主扁未焊合金额','钎焊金额','其它金额','变形金额','翅片掉带金额','检测金额','火焰焊金额','呛管金额','错漏装金额']; }
    }

    // 辅助实际展示缺陷合计列适配
    window.addEventListener('load', () => {
        renderKPI();
        initRateChart();
        initAmountChart();
        initDefectDonut();
        renderTable();
    });
</script>
</body>
</html>
