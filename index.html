<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEX车间报废分析看板 | 2026年5月</title>
    <!-- 引入 Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 ECharts 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f0f2f8;
            padding: 24px 20px;
        }

        /* 整体容器 */
        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
        }
        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1A2A3F, #2C4C6E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .title-section p {
            color: #5a6874;
            margin-top: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .badge-date {
            background: white;
            padding: 8px 20px;
            border-radius: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            font-weight: 600;
            color: #1e4663;
            border: 1px solid #e2e8f0;
        }
        .badge-date i {
            margin-right: 8px;
            color: #3b82f6;
        }

        /* KPI 卡片网格 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .kpi-card {
            background: white;
            border-radius: 28px;
            padding: 20px 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(203, 213, 225, 0.4);
            backdrop-filter: blur(2px);
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.08);
            border-color: #cbd5e1;
        }
        .kpi-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #5b6e8c;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .kpi-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f2b3d;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .kpi-sub {
            font-size: 0.75rem;
            color: #6f7d95;
            border-top: 1px solid #eef2f6;
            margin-top: 10px;
            padding-top: 8px;
        }
        .trend-up { color: #e53e3e; background: #fff5f5; border-radius: 20px; padding: 2px 8px; display: inline-block; font-weight: 600;}
        .trend-down { color: #38a169; background: #f0fff4; border-radius: 20px; padding: 2px 8px; display: inline-block; font-weight: 600;}

        /* 双图布局 */
        .chart-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 32px;
        }
        .chart-box {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 28px;
            padding: 16px 12px 12px 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            border: 1px solid #eef2f8;
            transition: all 0.2s;
        }
        .chart-box h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-left: 12px;
            margin-bottom: 12px;
            color: #1e2f41;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container {
            width: 100%;
            height: 360px;
        }
        .full-width-chart {
            background: white;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 32px;
            border: 1px solid #eef2f8;
        }
        .full-width-chart h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-left: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 表格区域 */
        .data-table-wrapper {
            background: white;
            border-radius: 28px;
            padding: 8px 0 8px 0;
            overflow-x: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            border: 1px solid #eef2f8;
        }
        .data-table-wrapper h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 12px 20px 16px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1000px;
        }
        th {
            background: #f8fafc;
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
            color: #1f2a3e;
            font-weight: 500;
        }
        tr:hover td {
            background-color: #fafcff;
        }
        .product-badge {
            font-weight: 700;
            background: #eef2ff;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
        }
        .footer-note {
            margin-top: 24px;
            text-align: right;
            font-size: 0.7rem;
            color: #7f8c8d;
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
        }
        @media (max-width: 700px) {
            body { padding: 16px; }
            .kpi-value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div class="title-section">
            <h1><i class="fas fa-chalkboard-user" style="color:#2c6e9e;"></i> HEX车间 · 报废全景看板</h1>
            <p>2026年5月 | 报废明细 & 多维归因分析 | 动态可视化报表</p>
        </div>
        <div class="badge-date">
            <i class="fas fa-calendar-alt"></i> 数据截止：2026年5月31日
        </div>
    </div>

    <!-- KPI 卡片区 - 动态计算核心指标 -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- 图表行：报废金额 TOP产品 + 报废率对比柱状图 -->
    <div class="chart-row">
        <div class="chart-box">
            <h3><i class="fas fa-chart-pie" style="color:#f97316;"></i> 各产品报废金额占比</h3>
            <div id="pieChart" class="chart-container"></div>
        </div>
        <div class="chart-box">
            <h3><i class="fas fa-chart-line" style="color:#0f6e3f;"></i> 报废率 vs 目标控制线</h3>
            <div id="barTargetChart" class="chart-container"></div>
        </div>
    </div>

    <!-- 全宽图表：报废原因分类汇总 (按大类金额堆叠) -->
    <div class="full-width-chart">
        <h3><i class="fas fa-clipboard-list" style="color:#3b82f6;"></i> 缺陷原因分布（按金额TOP 6 + 其他）</h3>
        <div id="reasonBarChart" style="height: 420px; width: 100%;"></div>
    </div>

    <!-- 详细数据表格 -->
    <div class="data-table-wrapper">
        <h3><i class="fas fa-table-list"></i> 产品级别详细报废数据</h3>
        <table id="detailTable">
            <thead>
                <tr>
                    <th>产品类别</th><th>报废当月限额(¥)</th><th>报废金额(¥)</th><th>索赔金额(¥)</th><th>实际报废金额(¥)</th><th>产值(¥)</th>
                    <th>当月实际报废率</th><th>报废控制目标</th><th>前道金额</th><th>碰伤金额</th><th>来料金额</th><th>主/扁未焊合</th>
                    <th>钎焊金额</th><th>其它金额</th><th>变形金额</th><th>翅片掉带</th><th>检测金额</th><th>火焰焊金额</th><th>呛管金额</th><th>错漏装</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- 动态填充 -->
            </tbody>
        </table>
    </div>
    <div class="footer-note">
        <i class="fas fa-chart-simple"></i> 注：实际报废金额 = 报废金额 - 索赔 | 报废率 = 实际报废金额 / 产值 | 数据基于HEX车间5月原始汇总
    </div>
</div>

<script>
    // ---------- 原始数据集 (从excel内容严格提取) ----------
    const productsData = [
        { name: "冷凝器", limit: 85717.6949855559, scrapAmount: 49248.63793703393, claim: 6375.287025575467,
          output: 4001289.340326936, actualScrap: 42873.35091145846, actualRate: 0.010714883944872473, target: 0.01,
          reasons: {"前道":19370.12683540187,"碰伤":3201.664366726404,"来料":5901.960724575468,"主与扁未焊合":1558.261850726404,
                    "钎焊":4797.022840575468,"其它":224.701729,"变形":3725.114854,"翅片掉带":294.234425575468,"检测":1380.9251733018718,
                    "火焰焊":937.5333395754681,"呛管":0,"错漏装":314.67319899999995} },
        { name: "油冷器", limit: 18338.81968002013, scrapAmount: 10761.439363031199, claim: 133.134486,
          output: 1381164.7654936702, actualScrap: 10628.304877031198, actualRate: 0.0076951752191798195, target: 0.007,
          reasons: {"前道":2199.8083680311997,"碰伤":4338.899589000001,"来料":133.134486,"主与扁未焊合":199.701729,
                    "钎焊":586.593658,"其它":21832.641723197983,"变形":1318.8333310000003,"翅片掉带":736.7175050000001,
                    "检测":673.691626,"火焰焊":282.790099,"呛管":0,"错漏装":66.567243} },
        { name: "蒸发器", limit: 269740.08369759016, scrapAmount: 236349.60748457088, claim: 19300.031167145335,
          output: 18475019.060029067, actualScrap: 217049.57631742556, actualRate: 0.011748273471988724, target: 0.01,
          reasons: {"前道":93954.2415043477,"碰伤":16934.406758035835,"来料":22276.748527132728,"主与扁未焊合":19969.83626032007,
                    "钎焊":27234.456777884337,"其它":2804.4385709999997,"变形":3048.3768739957977,"翅片掉带":2798.5936135810684,
                    "检测":7255.565191991605,"火焰焊":8668.823487048443,"呛管":61.891302,"错漏装":12314.025465035842} },
        { name: "水箱", limit: 60691.737006961484, scrapAmount: 44418.39369767006, claim: 627.768231,
          output: 2787999.535470004, actualScrap: 43790.625466670055, actualRate: 0.015706826672511543, target: 0.012,
          reasons: {"前道":37130.04572067,"碰伤":1172.174446,"来料":0,"主与扁未焊合":865.94704,
                    "钎焊":98.117078,"其它":3069.1558546484,"变形":369.423564,"翅片掉带":143.56946,
                    "检测":1488.2990019999997,"火焰焊":0,"呛管":0,"错漏装":346.37881600000003} },
        { name: "内冷", limit: 77047.78393613009, scrapAmount: 69697.35503105648, claim: 6554.738156041094,
          output: 4979668.624812634, actualScrap: 63142.61687501538, actualRate: 0.012680084084388487, target: 0.006,
          reasons: {"前道":30832.562717997258,"碰伤":7626.5302210410955,"来料":6686.291208255707,"主与扁未焊合":3684.865951611869,
                    "钎焊":4441.849828009129,"其它":2872.4126293722165,"变形":308.1162900365295,"翅片掉带":521.1823208584472,
                    "检测":2575.2178428949774,"火焰焊":8794.54680537899,"呛管":0,"错漏装":1103.6806467168947} },
        { name: "暖风", limit: 86792.18063934834, scrapAmount: 40908.37011215871, claim: 0,
          output: 3054223.891447906, actualScrap: 40908.37011215871, actualRate: 0.013394031205998264, target: 0.01,
          reasons: {"前道":23054.283438853305,"碰伤":2413.894019058323,"来料":44.610882000000004,"主与扁未焊合":7179.436280233299,
                    "钎焊":3240.1413988971376,"其它":0,"变形":124.14076300000002,"翅片掉带":267.028239,
                    "检测":609.4159053722165,"火焰焊":953.7459726861082,"呛管":64.2321576861082,"错漏装":85.028426} }
    ];

    // 计算合计 (用于顶部KPI)
    let totalLimit = 0, totalScrap = 0, totalClaim = 0, totalActual = 0, totalOutput = 0;
    productsData.forEach(p => {
        totalLimit += p.limit;
        totalScrap += p.scrapAmount;
        totalClaim += p.claim;
        totalActual += p.actualScrap;
        totalOutput += p.output;
    });
    const totalRate = totalActual / totalOutput;
    const targetOverall = 0.0095;  // 合计目标0.0095

    // 准备KPI渲染
    const formatMoney = (val) => '¥' + val.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
    const formatPercent = (val) => (val * 100).toFixed(2) + '%';
    const kpiData = [
        { icon: "fa-chart-line", title: "实际报废总金额", value: formatMoney(totalActual), sub: "扣除索赔后净损失", color: "#dc2626" },
        { icon: "fa-coins", title: "报废总额(毛)", value: formatMoney(totalScrap), sub: "含索赔前原值", color: "#f97316" },
        { icon: "fa-percent", title: "整体报废率", value: formatPercent(totalRate), sub: `目标 ${formatPercent(targetOverall)}` , trend: totalRate > targetOverall ? '高于目标' : '低于目标', isBad: totalRate > targetOverall },
        { icon: "fa-industry", title: "总产値", value: formatMoney(totalOutput), sub: "全车间产值贡献", color: "#2c6e9e" },
        { icon: "fa-chart-simple", title: "总报废限额", value: formatMoney(totalLimit), sub: "当月限额", color: "#4b5563" },
        { icon: "fa-hand-holding-usd", title: "索赔金额", value: formatMoney(totalClaim), sub: "索赔回收总额", color: "#059669" }
    ];

    function renderKPI() {
        const container = document.getElementById('kpiGrid');
        container.innerHTML = kpiData.map(k => `
            <div class="kpi-card">
                <div class="kpi-title"><i class="fas ${k.icon}" style="color:${k.color || '#3b82f6'}"></i> ${k.title}</div>
                <div class="kpi-value">${k.value}</div>
                <div class="kpi-sub">${k.sub} ${k.trend ? `<span class="${k.isBad ? 'trend-up' : 'trend-down'}"><i class="fas ${k.isBad ? 'fa-arrow-up' : 'fa-arrow-down'}"></i> ${k.trend}</span>` : ''}</div>
            </div>
        `).join('');
    }

    // 渲染饼图: 各产品实际报废金额占比
    function initPieChart() {
        const chart = echarts.init(document.getElementById('pieChart'));
        const pieData = productsData.map(p => ({ name: p.name, value: p.actualScrap }));
        chart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
            legend: { orient: 'vertical', left: 'left', textStyle: { color: '#334155' } },
            series: [{
                type: 'pie', radius: '55%', center: ['50%', '55%'], data: pieData,
                label: { show: true, formatter: '{b}', position: 'outside', color: '#1f2937' },
                emphasis: { scale: true }, itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 }
            }],
            color: ['#3b82f6','#f97316','#10b981','#8b5cf6','#ef4444','#06b6d4']
        });
        window.addEventListener('resize', () => chart.resize());
    }

    // 报废率 vs 目标 柱状图
    function initBarTarget() {
        const chart = echarts.init(document.getElementById('barTargetChart'));
        const categories = productsData.map(p => p.name);
        const actualRates = productsData.map(p => p.actualRate * 100);
        const targets = productsData.map(p => p.target * 100);
        chart.setOption({
            tooltip: { trigger: 'axis', valueFormatter: (value) => value?.toFixed(2) + '%' },
            legend: { data: ['实际报废率 (%)', '控制目标 (%)'], left: 'left' },
            xAxis: { type: 'category', data: categories, axisLabel: { rotate: 20, fontWeight:500 } },
            yAxis: { type: 'value', name: '报废率 (%)', axisLabel: { formatter: '{value}%' } },
            series: [
                { name: '实际报废率 (%)', type: 'bar', data: actualRates, itemStyle: { borderRadius: [6,6,0,0], color: '#e11d48' }, label: { show: true, position: 'top', formatter: '{c}%' } },
                { name: '控制目标 (%)', type: 'line', data: targets, lineStyle: { width: 3, color: '#2c6e9e', type: 'dashed' }, symbol: 'circle', symbolSize: 8, itemStyle: { color: '#1e40af' } }
            ],
            grid: { containLabel: true, top: 40, bottom: 20 }
        });
        window.addEventListener('resize', () => chart.resize());
    }

    // 缺陷原因分布 (合并所有产品的原因金额，取前6大 + 其他)
    function buildReasonAgg() {
        const reasonMap = new Map();
        productsData.forEach(p => {
            Object.entries(p.reasons).forEach(([reason, amount]) => {
                if (amount && amount > 0) {
                    reasonMap.set(reason, (reasonMap.get(reason) || 0) + amount);
                }
            });
        });
        // 转为数组并排序
        let sorted = Array.from(reasonMap.entries()).map(([name, val]) => ({ name, value: val }));
        sorted.sort((a,b) => b.value - a.value);
        const top6 = sorted.slice(0,6);
        const otherSum = sorted.slice(6).reduce((sum, item) => sum + item.value, 0);
        if (otherSum > 0) top6.push({ name: '其他原因', value: otherSum });
        return top6;
    }

    function initReasonChart() {
        const chartDom = document.getElementById('reasonBarChart');
        const chart = echarts.init(chartDom);
        const data = buildReasonAgg();
        chart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: (params) => {
                let val = params[0].value;
                return `${params[0].axisValue}<br/>报废金额: ¥${val.toLocaleString('zh-CN', {minimumFractionDigits:2})}`;
            } },
            xAxis: { type: 'category', data: data.map(d => d.name), axisLabel: { rotate: 25, fontWeight:'bold', fontSize: 11 } },
            yAxis: { type: 'value', name: '报废金额 (¥)', axisLabel: { formatter: (val) => '¥' + (val/1000).toFixed(0)+'k' } },
            series: [{
                name: '报废金额', type: 'bar', data: data.map(d => d.value),
                itemStyle: { borderRadius: [6,6,0,0], color: '#f97316', shadowColor: 'rgba(0,0,0,0.1)' },
                label: { show: true, position: 'top', formatter: (p) => '¥' + (p.value/1000).toFixed(1)+'k', fontSize: 10 }
            }],
            grid: { containLabel: true, top: 30, bottom: 40 }
        });
        window.addEventListener('resize', () => chart.resize());
    }

    // 填充表格数据 (详细)
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        productsData.forEach(p => {
            const row = document.createElement('tr');
            const reasons = p.reasons;
            row.innerHTML = `
                <td><span class="product-badge">${p.name}</span></td>
                <td>${p.limit.toFixed(2)}</td>
                <td>${p.scrapAmount.toFixed(2)}</td>
                <td>${p.claim.toFixed(2)}</td>
                <td><strong>${p.actualScrap.toFixed(2)}</strong></td>
                <td>${p.output.toFixed(2)}</td>
                <td class="${p.actualRate > p.target ? 'trend-up' : 'trend-down'}" style="font-weight:600">${(p.actualRate*100).toFixed(3)}%</td>
                <td>${(p.target*100).toFixed(2)}%</td>
                <td>${(reasons["前道"] || 0).toFixed(2)}</td>
                <td>${(reasons["碰伤"] || 0).toFixed(2)}</td>
                <td>${(reasons["来料"] || 0).toFixed(2)}</td>
                <td>${(reasons["主与扁未焊合"] || 0).toFixed(2)}</td>
                <td>${(reasons["钎焊"] || 0).toFixed(2)}</td>
                <td>${(reasons["其它"] || 0).toFixed(2)}</td>
                <td>${(reasons["变形"] || 0).toFixed(2)}</td>
                <td>${(reasons["翅片掉带"] || 0).toFixed(2)}</td>
                <td>${(reasons["检测"] || 0).toFixed(2)}</td>
                <td>${(reasons["火焰焊"] || 0).toFixed(2)}</td>
                <td>${(reasons["呛管"] || 0).toFixed(2)}</td>
                <td>${(reasons["错漏装"] || 0).toFixed(2)}</td>
            `;
            tbody.appendChild(row);
        });
        // 添加合计行 (美观)
        const footerRow = document.createElement('tr');
        footerRow.style.background = "#f1f5f9";
        footerRow.style.fontWeight = "bold";
        footerRow.innerHTML = `
            <td><strong>合计 / 均值</strong></td>
            <td><strong>${totalLimit.toFixed(2)}</strong></td>
            <td><strong>${totalScrap.toFixed(2)}</strong></td>
            <td><strong>${totalClaim.toFixed(2)}</strong></td>
            <td><strong>${totalActual.toFixed(2)}</strong></td>
            <td><strong>${totalOutput.toFixed(2)}</strong></td>
            <td><strong>${(totalRate*100).toFixed(3)}%</strong></td>
            <td><strong>0.95%</strong></td>
            <td colspan="12">基于各产品缺陷原因汇总</td>
        `;
        tbody.appendChild(footerRow);
    }

    // 附加辅助图表: 额外为了更动态，使用echarts实例自适应
    window.addEventListener('load', () => {
        renderKPI();
        initPieChart();
        initBarTarget();
        initReasonChart();
        renderTable();
        // 可增加resize监听统一优化
        const allCharts = [echarts.getInstanceByDom(document.getElementById('pieChart')),
                           echarts.getInstanceByDom(document.getElementById('barTargetChart')),
                           echarts.getInstanceByDom(document.getElementById('reasonBarChart'))];
        window.addEventListener('resize', () => {
            allCharts.forEach(ch => ch && ch.resize());
        });
    });
</script>
</body>
</html>
