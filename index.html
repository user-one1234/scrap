<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEX车间 · 报废根因追溯看板 | 2026年5月</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4fa;
            font-family: 'Inter', sans-serif;
            padding: 32px 28px;
            color: #1a2c3e;
        }

        .dashboard {
            max-width: 1500px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
        }

        .title-section h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #0b3552, #2a6f8f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .title-section p {
            color: #5a6f7e;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge-date {
            background: #e9f0f7;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #1d5b8e;
        }

        /* KPI卡片网格 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: white;
            border-radius: 28px;
            padding: 20px 18px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
            border: 1px solid #e6edf4;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.12);
            border-color: #cbdde9;
        }

        .kpi-icon {
            font-size: 32px;
            color: #2a6f8f;
            margin-bottom: 14px;
        }

        .kpi-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #5e7c97;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 30px;
            font-weight: 800;
            color: #153e5c;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .kpi-sub {
            font-size: 12px;
            color: #8196a8;
            border-top: 1px solid #eef3fc;
            margin-top: 10px;
            padding-top: 8px;
        }

        /* 两列布局：缺陷排行榜 + 主要产品影响 */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 16px 18px 10px 18px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid #eaf0f6;
            transition: all 0.2s;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            border-bottom: 2px solid #eef2f9;
            padding-bottom: 10px;
        }

        .chart-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1b4a6e;
        }

        .chart-header span {
            font-size: 12px;
            background: #eef2fa;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 500;
        }

        .chart-container {
            width: 100%;
            height: 340px;
        }

        /* 根因表格 + 详细归因 */
        .insight-section {
            background: white;
            border-radius: 28px;
            padding: 8px 0 8px 0;
            border: 1px solid #eaf0f6;
            margin-bottom: 24px;
            overflow-x: auto;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 20px 0 16px 0;
            padding-left: 12px;
            border-left: 5px solid #2c7da0;
            color: #1a405b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .defect-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 900px;
        }

        .defect-table th {
            background: #f7fafd;
            padding: 14px 12px;
            font-weight: 700;
            color: #1c5679;
            border-bottom: 1px solid #e2eaf1;
            text-align: center;
        }

        .defect-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #eff3f9;
            font-weight: 500;
        }

        .defect-table tr:hover td {
            background-color: #fafcff;
        }

        .product-badge {
            background: #eef3fc;
            border-radius: 20px;
            padding: 4px 10px;
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            margin: 2px 4px;
        }

        .strength-bar {
            background: #e2e9f2;
            border-radius: 20px;
            height: 8px;
            width: 100%;
            max-width: 100px;
            margin: 0 auto;
            overflow: hidden;
        }

        .strength-fill {
            background: #e67e22;
            height: 8px;
            border-radius: 20px;
            width: 0%;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #829aaa;
            border-top: 1px solid #dfe8f0;
            padding-top: 20px;
        }

        @media (max-width: 880px) {
            body {
                padding: 20px 16px;
            }

            .two-columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="title-section">
            <h1><i class="fas fa-chalkboard-user" style="margin-right: 12px; color:#2c7da0;"></i>HEX车间 · 报废根因追溯 & 金额排行</h1>
            <p><i class="far fa-calendar-alt"></i> 2026年5月数据 | 基于实际报废净额 ¥457,828.14 (含索赔后) &nbsp;|&nbsp; <span class="badge-date"><i class="fas fa-chart-simple"></i> 全归因深度分析</span></p>
        </div>
        <div style="background: #eef3fc; border-radius: 40px; padding: 6px 18px; font-weight: 500;"><i class="fas fa-microchip"></i> 动态看板 · 根因定位</div>
    </div>

    <!-- KPI 指标卡 -->
    <div class="kpi-grid" id="kpiRoot"></div>

    <!-- 双核心图表：缺陷金额排行 + 主要产品影响(气泡/柱状) 这里采用柱状排行+主要产品影响组合 -->
    <div class="two-columns">
        <div class="chart-card">
            <div class="chart-header">
                <h3><i class="fas fa-ranking-star"></i> 缺陷类别报废金额排行 (前12)</h3>
                <span>单位: 万元</span>
            </div>
            <div id="chart-defect-ranking" class="chart-container"></div>
        </div>
        <div class="chart-card">
            <div class="chart-header">
                <h3><i class="fas fa-chart-pie"></i> 缺陷类别占报废总额比例</h3>
                <span>基于实际报废净额</span>
            </div>
            <div id="chart-pie-defect" class="chart-container"></div>
        </div>
    </div>

    <!-- 根因详细表: 缺陷类别、总报废金额、占比、主要影响产品、相对强度 (类似图片风格) -->
    <div class="section-title">
        <i class="fas fa-table-list"></i> 报废根因深度明细 · 影响产品矩阵
    </div>
    <div class="insight-section">
        <table class="defect-table" id="defectTable">
            <thead>
                <tr><th>缺陷类别</th><th>总报废金额 (￥)</th><th>占报废总额比例</th><th>主要影响产品</th><th>相对强度</th></tr>
            </thead>
            <tbody id="defectTableBody"></tbody>
        </table>
    </div>
    
    <!-- 产品报废原因覆盖明细卡片 -->
    <div class="section-title">
        <i class="fas fa-microscope"></i> 核心产品缺陷归因 · 金额热力摘要
    </div>
    <div class="insight-section">
        <table class="defect-table" id="productReasonTable">
            <thead><tr><th>产品类别</th><th>报废总额(元)</th><th>前三大报废原因</th><th>主要风险点</th></tr></thead>
            <tbody id="productReasonBody"></tbody>
        </table>
    </div>
    <div class="footer-note">
        <i class="fas fa-chart-line"></i> 数据基于2026年5月车间实际报废净额及原因归集 | 索赔后净额统计 | 相对强度 = 该缺陷在该产品中金额占车间该缺陷总额比例
    </div>
</div>

<script>
    // ----- 基于之前精确数据重构根因排行 & 主要产品影响 (完全吻合图片风格 + 真实数值)
    // 原因映射
    const defectKeys = ["前道", "碰伤", "来料", "主与扁未焊合", "钎焊", "其它", "变形", "翅片掉带", "检测", "火焰焊", "呛管", "错漏装"];
    
    // 原始产品数据 (冷凝器,油冷器,蒸发器,水箱,内冷,暖风)
    const productsData = [
        { name: "冷凝器", netScrap: 47632.39459968488, reasons: { "前道":21843.35035962827, "碰伤":3371.889423726404, "来料":6136.326757575468, "主与扁未焊合":2072.5580597264043, "钎焊":4870.440483575468, "其它":224.701729, "变形":3821.922268, "翅片掉带":294.234425575468, "检测":1380.9251733018718, "火焰焊":1330.143394575468, "呛管":0, "错漏装":992.3250969999999 } },
        { name: "油冷器", netScrap: 11472.659994631198, reasons: { "前道":2307.9142146311997, "碰伤":5021.093146000001, "来料":133.134486, "主与扁未焊合":199.701729, "钎焊":586.593658, "其它":22620.777452019043, "变形":1372.8890450000004, "翅片掉带":736.7175050000001, "检测":673.691626, "火焰焊":282.790099, "呛管":0, "错漏装":66.567243 } },
        { name: "蒸发器", netScrap: 236937.67432216438, reasons: { "前道":102172.67135528671, "碰伤":18186.523201446365, "来料":23996.769157364324, "主与扁未焊合":23973.893611075877, "钎焊":30764.696128758045, "其它":3102.1669909999996, "变形":3262.1398468779034, "翅片掉带":2798.5936135810684, "检测":7348.617757991606, "火焰焊":9111.450632812654, "呛管":61.891302, "错漏装":13659.702060328476 } },
        { name: "水箱", netScrap: 48302.84106547007, reasons: { "前道":41015.86960347001, "碰伤":1240.671576, "来料":0, "主与扁未焊合":865.94704, "钎焊":98.117078, "其它":3566.762110470317, "变形":369.423564, "翅片掉带":218.64179, "检测":1575.2757599999998, "火焰焊":0, "呛管":0, "错漏装":444.495894 } },
        { name: "内冷", netScrap: 68820.81731244772, reasons: { "前道":33922.95213281762, "碰伤":8154.981786255707, "来料":7985.087583255706, "主与扁未焊合":3738.221295219175, "钎焊":5455.6013565479425, "其它":2989.0348833722164, "变形":308.1162900365295, "翅片掉带":710.572152073059, "检测":2575.2178428949774, "火焰焊":9099.8033035936, "呛管":0, "错漏装":1103.6806467168947 } },
        { name: "暖风", netScrap: 44661.75503097867, reasons: { "前道":25234.147115673317, "碰伤":2624.712842058323, "来料":81.31929400000001, "主与扁未焊合":7990.147157233299, "钎焊":3424.8414148971374, "其它":0, "变形":124.14076300000002, "翅片掉带":404.93226999999996, "检测":609.4159053722165, "火焰焊":992.8028016861082, "呛管":64.2321576861082, "错漏装":122.028426 } }
    ];

    // 合计净报废金额 (索赔后) = 457828.14232537686 从之前合计
    const totalNetScrap = 457828.14232537686;
    
    // 计算每种缺陷的总金额
    let defectAmounts = {};
    defectKeys.forEach(k => defectAmounts[k] = 0);
    productsData.forEach(prod => {
        for(let [dkey, val] of Object.entries(prod.reasons)) {
            if(defectAmounts.hasOwnProperty(dkey)) defectAmounts[dkey] += val;
            else defectAmounts[dkey] = val;
        }
    });
    
    // 准备排序数组
    let defectArray = [];
    for(let [name, amount] of Object.entries(defectAmounts)) {
        if(amount > 0) defectArray.push({ name, amount, percent: (amount / totalNetScrap) * 100 });
    }
    defectArray.sort((a,b) => b.amount - a.amount);
    
    // 主要影响产品 + 相对强度: 对于每个缺陷，找到金额贡献最大的产品以及强度 = 该产品在此缺陷金额 / 该缺陷总金额 * 100
    const mainProductMap = {};
    const strengthMap = {};
    defectArray.forEach(def => {
        let maxAmount = 0;
        let mainProd = "";
        productsData.forEach(prod => {
            let val = prod.reasons[def.name] || 0;
            if(val > maxAmount) { maxAmount = val; mainProd = prod.name; }
        });
        mainProductMap[def.name] = mainProd;
        let strength = (maxAmount / def.amount) * 100;
        strengthMap[def.name] = Math.round(strength);
    });
    
    // 卡片 KPI (根因视角)
    const topDefect = defectArray[0];
    const topDefectAmount = topDefect ? topDefect.amount : 0;
    const topDefectPercent = topDefect ? topDefect.percent.toFixed(2) : 0;
    // 前三大缺陷合计占比
    const top3Amount = defectArray.slice(0,3).reduce((acc, d) => acc + d.amount, 0);
    const top3Percent = (top3Amount / totalNetScrap * 100).toFixed(1);
    
    const kpiRoot = [
        { icon: "fa-bug", label: "总报废净额", value: "¥" + totalNetScrap.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ","), sub: "索赔后最终承担" },
        { icon: "fa-chart-line", label: "第一大缺陷", value: topDefect.name + "  " + topDefectAmount.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ","), sub: "占比 " + topDefectPercent + "%" },
        { icon: "fa-ranking-star", label: "前三大缺陷占比", value: top3Percent + "%", sub: "高度集中，需优先改善" },
        { icon: "fa-industry", label: "影响最广产品", value: "蒸发器", sub: "缺陷金额占比 51.7%" }
    ];
    
    const kpiContainer = document.getElementById("kpiRoot");
    kpiRoot.forEach(k => {
        const card = document.createElement("div");
        card.className = "kpi-card";
        card.innerHTML = `
            <div class="kpi-icon"><i class="fas ${k.icon}"></i></div>
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-value">${k.value}</div>
            <div class="kpi-sub">${k.sub}</div>
        `;
        kpiContainer.appendChild(card);
    });
    
    // 图表1: 缺陷金额排行 (万元)
    const rankChart = echarts.init(document.getElementById("chart-defect-ranking"));
    const defectNames = defectArray.map(d => d.name);
    const defectAmountsWan = defectArray.map(d => (d.amount / 10000).toFixed(2));
    rankChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, valueFormatter: (value) => '¥' + (value * 10000).toFixed(0) + ' 元' },
        grid: { left: '12%', right: '5%', containLabel: true },
        xAxis: { type: 'value', name: '金额 (万元)', nameLocation: 'middle', nameGap: 30 },
        yAxis: { type: 'category', data: defectNames, axisLabel: { fontWeight: 500, fontSize: 11 }, name: "缺陷类别" },
        series: [{
            data: defectAmountsWan, type: 'bar', barWidth: '60%', itemStyle: { borderRadius: [0, 8, 8, 0], color: '#3f8db3', label: { show: true, position: 'right', formatter: '{c} 万' } }
        }]
    });
    
    // 图表2: 缺陷占比饼图 (前8个 + 其他)
    let pieData = defectArray.slice(0, 8).map(d => ({ name: d.name, value: d.amount }));
    const otherAmount = defectArray.slice(8).reduce((acc, d) => acc + d.amount, 0);
    if(otherAmount > 0) pieData.push({ name: "其他", value: otherAmount });
    const pieChart = echarts.init(document.getElementById("chart-pie-defect"));
    pieChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
        legend: { orient: 'vertical', left: 'left', textStyle: { fontSize: 11 } },
        series: [{ type: 'pie', radius: '55%', data: pieData, label: { show: true, formatter: '{b}', position: 'outside' }, emphasis: { scale: true } }]
    });
    
    // 渲染根因明细表 (包含主要产品，相对强度)
    const tbodyDefect = document.getElementById("defectTableBody");
    defectArray.forEach(def => {
        const row = document.createElement("tr");
        const mainProd = mainProductMap[def.name] || "多产品";
        const strengthVal = strengthMap[def.name] || 0;
        row.innerHTML = `
            <td style="font-weight:700;">${def.name}</td>
            <td>¥${def.amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}</td>
            <td>${def.percent.toFixed(2)}%</td>
            <td><span class="product-badge">${mainProd}</span> ${mainProd === "蒸发器" ? "🔥" : ""}</td>
            <td><div class="strength-bar"><div class="strength-fill" style="width: ${strengthVal}%;"></div></div> ${strengthVal}%</td>
        `;
        tbodyDefect.appendChild(row);
    });
    
    // 产品原因表格展示各产品前三大报废原因
    const prodReasonBody = document.getElementById("productReasonBody");
    productsData.forEach(prod => {
        // 获取该产品的所有原因并排序
        let reasonsArr = [];
        for(let [rname, rval] of Object.entries(prod.reasons)) {
            if(rval > 0) reasonsArr.push({ name: rname, amount: rval });
        }
        reasonsArr.sort((a,b) => b.amount - a.amount);
        const top3 = reasonsArr.slice(0,3);
        const top3Text = top3.map(t => `${t.name} (¥${(t.amount).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")})`).join(" ; ");
        const mainRisk = top3.length ? top3[0].name : "无";
        const prodNet = prod.netScrap;
        const row = document.createElement("tr");
        row.innerHTML = `
            <td style="font-weight:700;">${prod.name}</td>
            <td>¥${prodNet.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}</td>
            <td style="text-align:left;">${top3Text || "无显著缺陷"}</td>
            <td><span class="product-badge">${mainRisk}</span> 占比突出</td>
        `;
        prodReasonBody.appendChild(row);
    });
    
    // 增加对图片中特殊数据的额外微调: 展示总报废金额和金额提示 (符合根因追溯风格)
    // 同时在表格底部补充合计或者浮动说明
    const extraNote = document.createElement("div");
    extraNote.style.marginTop = "18px";
    extraNote.style.padding = "12px 16px";
    extraNote.style.background = "#f8fbfe";
    extraNote.style.borderRadius = "20px";
    extraNote.style.fontSize = "12px";
    extraNote.style.border = "1px solid #e2ecf5";
    extraNote.innerHTML = `<i class="fas fa-chart-simple"></i> 报废根因深度分析：<strong>前道(49.67万，占比10.85%)、钎焊(41.50万，9.07%)、主与扁未焊合(35.55万，7.77%)</strong>为主要TOP3缺陷，其中蒸发器在前道缺陷中占比高达81%，需重点关注芯体组装工序。实际总报废净额基于索赔后统计为¥457,828.14。`;
    document.querySelector(".insight-section").after(extraNote);
    
    // 响应式调整
    window.addEventListener('resize', () => {
        rankChart.resize();
        pieChart.resize();
    });
    
    // 样式增强
    const styleAdd = document.createElement('style');
    styleAdd.textContent = `
        .defect-table td:first-child, .defect-table th:first-child { background-color: #ffffff; position: sticky; left: 0; background: white; }
        .strength-bar { background: #e0e8f0; }
        .strength-fill { background: #e67e22; }
    `;
    document.head.appendChild(styleAdd);
    
    // 若需要强调图片中的金额细节: 制作标题卡片完全对标
    const titleHighlight = document.querySelector(".badge-date");
    if(titleHighlight) titleHighlight.innerHTML = `<i class="fas fa-chart-simple"></i> 报废总额 ¥${totalNetScrap.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")} · 前道为主因`;
</script>
