<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEX车间报废数据看板 | 2026年5月</title>
    <!-- 引入 ECharts 核心库 & 图表库 & 字体 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f0f2f8;
            padding: 24px 20px;
        }

        /* 模拟自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e9ecef;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #adb5bd;
            border-radius: 10px;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
        }
        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E2A5E, #2D3A6E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .title-section p {
            color: #5a6874;
            font-weight: 500;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge-date {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            color: #1e2a3e;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 18px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
            border: 1px solid rgba(226, 232, 240, 0.8);
            backdrop-filter: blur(2px);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
            border-color: #cbd5e1;
        }
        .stat-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #4b5565;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-number {
            font-size: 2.3rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
        }
        .stat-sub {
            font-size: 0.8rem;
            color: #5f6c80;
            margin-top: 8px;
            border-top: 1px solid #edf2f7;
            padding-top: 8px;
        }
        .trend-up { color: #e53e3e; }
        .trend-down { color: #38a169; }
        .icon-bg {
            background: #eef2ff;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            color: #2c3e66;
        }

        /* 两列图表布局 */
        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 36px;
        }
        .chart-box {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 28px;
            padding: 20px 16px 16px 16px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
            border: 1px solid #eef2f8;
            transition: all 0.2s;
        }
        .chart-box h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 8px;
            border-left: 5px solid #3b82f6;
            color: #1e293b;
        }
        .chart-container {
            width: 100%;
            height: 340px;
        }

        /* 详细表格区域 */
        .data-table-wrapper {
            background: white;
            border-radius: 28px;
            padding: 20px 0 8px 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.03);
            border: 1px solid #eef2f8;
            margin-top: 8px;
            overflow-x: auto;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0 24px 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1100px;
        }
        th {
            background: #f8fafd;
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            color: #1e2a44;
            border-bottom: 1.5px solid #e2edf7;
            font-size: 0.75rem;
            letter-spacing: 0.3px;
        }
        td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #ecf3fa;
            color: #1f2a44;
            font-weight: 500;
        }
        tr:hover td {
            background-color: #fafcff;
        }
        .product-badge {
            font-weight: 700;
            background: #eef2ff;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
        }
        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.75rem;
            color: #6c7a91;
            background: #ffffffc9;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 780px) {
            .stat-number { font-size: 1.6rem; }
            body { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div class="title-section">
            <h1><i class="fas fa-chart-line" style="color: #2c3e66; margin-right: 12px;"></i>HEX车间 · 报废数据驾驶舱</h1>
            <p><i class="fas fa-calendar-alt"></i> 2026年5月 月度报废分析报告 <span class="badge-date"><i class="fas fa-chart-pie"></i> 动态看板</span></p>
        </div>
        <div style="font-size:0.85rem; background: #ffffffc9; padding: 8px 18px; border-radius: 40px;">
            <i class="fas fa-industry"></i> 冷凝器 | 油冷器 | 蒸发器 | 水箱 | 内冷 | 暖风
        </div>
    </div>

    <!-- 关键指标卡片 (动态计算) -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- 图表区域: 报废金额排行 & 报废率对比 & 原因帕累托等 -->
    <div class="charts-row">
        <div class="chart-box">
            <h3><i class="fas fa-chart-bar" style="margin-right: 8px;"></i> 各产品报废金额 & 实际报废率</h3>
            <div id="chart-bar" class="chart-container"></div>
        </div>
        <div class="chart-box">
            <h3><i class="fas fa-chart-pie"></i> 五大报废原因占比（全车间）</h3>
            <div id="chart-pie" class="chart-container"></div>
        </div>
    </div>
    <div class="charts-row">
        <div class="chart-box">
            <h3><i class="fas fa-exclamation-triangle"></i> 报废损失排名 & 超限预警</h3>
            <div id="chart-warning" class="chart-container"></div>
        </div>
        <div class="chart-box">
            <h3><i class="fas fa-microscope"></i> 缺陷明细分布 — 前五大类缺陷</h3>
            <div id="chart-defects" class="chart-container"></div>
        </div>
    </div>

    <!-- 详细数据表格：展示每一类产品的明细报废构成 -->
    <div class="data-table-wrapper">
        <div class="section-title">
            <i class="fas fa-table-list" style="color: #2c6e9e;"></i> 产品级别报废明细表 (金额/元 & 比例)
            <span style="font-size: 12px; background:#ecfdf5; padding: 4px 10px; border-radius: 30px;"><i class="fas fa-chart-simple"></i> 含缺陷分类占比</span>
        </div>
        <div style="overflow-x: auto;">
            <table id="detailTable">
                <thead>
                    <tr><th>产品类别</th><th>报废当月限额(元)</th><th>报废金额(元)</th><th>索赔(元)</th><th>实际报废(元)</th><th>产值(元)</th><th>实际报废率</th><th>目标报废率</th><th>前道(金额/比例)</th><th>碰伤</th><th>来料</th><th>主扁未焊合</th><th>钎焊</th><th>其它</th><th>变形</th><th>翅片掉带</th><th>检测</th><th>火焰焊</th><th>呛管</th><th>错漏装</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-chart-line"></i> 数据基于2026年5月HEX车间实际报废统计 | 动态可视化呈现报废构成及缺陷权重
    </div>
</div>

<script>
    // ======================= 原始数据 (从excel表格提取，完全忠实原文) ======================
    const productsData = [
        { name: "冷凝器", limit: 35681.90853323204, scrapAmount: 35681.90853323204, claim: 4176.601552575467, actualScrap: 31505.306980656573, output: 2835758.9653109643, actualRate: 0.011110008772272984, targetRate: 0.01,
          defects: { "前道":13475.35117090187,"碰伤":2777.950712150936,"来料":3987.4072065754676,"主与扁未焊合":1408.550638726404,"钎焊":3657.9581525754675,"其它":204.701729,"变形":2947.613867,"翅片掉带":294.234425575468,"检测":489.629568575468,"火焰焊":819.1156965754681,"呛管":0,"错漏装":314.67319899999995 } },
        { name: "油冷器", limit: 5764.0215660904, scrapAmount:5764.0215660904, claim:66.567243, actualScrap:5697.454323090399, output:1041992.0986471514, actualRate:0.005467847914094138, targetRate:0.007,
          defects: {"前道":1652.3977260903996,"碰伤":1905.4269890000003,"来料":66.567243,"主与扁未焊合":66.567243,"钎焊":586.593658,"其它":17886.819715442172,"变形":532.537944,"翅片掉带":266.737206,"检测":349.357342,"火焰焊":66.567243,"呛管":0,"错漏装":66.567243} },
        { name: "蒸发器", limit:182261.56574085122, scrapAmount:182261.56574085122, claim:13878.441831974793, actualScrap:168383.12390887644, output:13672085.250621472, actualRate:0.012315833380370598, targetRate:0.01,
          defects: {"前道":75625.57826561706,"碰伤":13410.209616804252,"来料":17508.65338496219,"主与扁未焊合":16546.972448560064,"钎焊":19010.087702080087,"其它":2423.221581,"变形":2517.655584585269,"翅片掉带":1222.3221559389522,"检测":3895.212929995799,"火焰焊":8291.604086402125,"呛管":0,"错漏装":6346.449850463177} },
        { name: "水箱", limit:30631.85026719001, scrapAmount:30631.85026719001, claim:627.768231, actualScrap:30004.08203619001, output:2058054.4141767821, actualRate:0.014578857502264626, targetRate:0.012,
          defects: {"前道":26227.80719019001,"碰伤":721.740466,"来料":0,"主与扁未焊合":294.351234,"钎焊":98.117078,"其它":2709.699992611871,"变形":271.306486,"翅片掉带":0,"检测":422.11682399999995,"火焰焊":0,"呛管":0,"错漏装":173.189408} },
        { name: "内冷", limit:53386.76958805241, scrapAmount:53386.76958805241, claim:4952.842070182647, actualScrap:48433.927517869764, output:3478314.8827756825, actualRate:0.013924537930050676, targetRate:0.006,
          defects: {"前道":22176.596100824205,"碰伤":5807.221257575342,"来料":5006.197413789953,"主与扁未焊合":3322.5834961826463,"钎焊":3827.7989315433774,"其它":2271.7952213722165,"变形":160.0660308219177,"翅片掉带":201.0502592146118,"检测":1209.8046762511412,"火焰焊":8122.526416342461,"呛管":0,"错漏装":789.869669287671} },
        { name: "暖风", limit:26786.74910440766, scrapAmount:26786.74910440766, claim:0, actualScrap:26786.74910440766, output:2055414.6686383702, actualRate:0.013032284683534349, targetRate:0.01,
          defects: {"前道":13592.036572138322,"碰伤":1832.8305106861073,"来料":44.610882,"主与扁未焊合":4942.627484058324,"钎焊":2696.8574957804885,"其它":0,"变形":75.820749,"翅片掉带":157.924494,"检测":178.10795,"火焰焊":905.7455806861083,"呛管":64.2321576861082,"错漏装":24.160007} }
    ];

    // 合计行单独计算(依据excel合计，但为了精确动态用)
    const totalRow = {
        name: "合计", limit: 334512.8647998238, scrapAmount:334512.8647998238, claim:23702.22092873291, actualScrap:310810.64387109084, output:27711416.38990406, actualRate:0.011215978263179889, targetRate:0.0095,
        defects: {"前道":152749.76702576186,"碰伤":26455.37955221664,"来料":26613.43613032761,"主与扁未焊合":26581.652544527442,"钎焊":29877.41301797942,"其它":25496.238239426257,"变形":6505.000661407187,"翅片掉带":2142.268540729032,"检测":6544.229290822408,"火焰焊":18205.55902300616,"呛管":64.2321576861082,"错漏装":7714.909376750849}
    };

    // 准备渲染
    function formatCurrency(value) {
        if (value === undefined) return "0.00";
        return value.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    function formatPercent(value) {
        return (value * 100).toFixed(2) + "%";
    }

    // 渲染顶部卡片 KPI
    function renderStats() {
        const totalActualScrap = totalRow.actualScrap;
        const totalOutput = totalRow.output;
        const totalClaim = totalRow.claim;
        const totalTargetRate = totalRow.targetRate;
        const totalActualRate = totalRow.actualRate;
        const overTargetFlag = totalActualRate > totalTargetRate;
        const deviation = (totalActualRate - totalTargetRate) * 100;
        
        // 最大报废产品
        let maxScrapProd = productsData.reduce((max, p) => p.actualScrap > max.actualScrap ? p : max, productsData[0]);
        const statsHtml = `
            <div class="stat-card"><div class="stat-title"><span class="icon-bg"><i class="fas fa-trash-alt"></i></span> 总实际报废金额</div><div class="stat-number">¥${formatCurrency(totalActualScrap)}</div><div class="stat-sub">占产值 ${formatPercent(totalActualRate)}</div></div>
            <div class="stat-card"><div class="stat-title"><span class="icon-bg"><i class="fas fa-chart-line"></i></span> 总报废率对比</div><div class="stat-number">${formatPercent(totalActualRate)}<span style="font-size:1rem;"> / ${formatPercent(totalTargetRate)}</span></div><div class="stat-sub ${overTargetFlag ? 'trend-up' : 'trend-down'}"><i class="fas ${overTargetFlag ? 'fa-arrow-up' : 'fa-arrow-down'}"></i> 超目标 ${Math.abs(deviation).toFixed(2)}% ${overTargetFlag ? '（超出）' : '（达标）'}</div></div>
            <div class="stat-card"><div class="stat-title"><span class="icon-bg"><i class="fas fa-hand-holding-usd"></i></span> 索赔总额</div><div class="stat-number">¥${formatCurrency(totalClaim)}</div><div class="stat-sub">可冲减报废损失</div></div>
            <div class="stat-card"><div class="stat-title"><span class="icon-bg"><i class="fas fa-chart-simple"></i></span> 产值规模</div><div class="stat-number">¥${(totalOutput/10000).toFixed(1)}万</div><div class="stat-sub">总产出 ${formatCurrency(totalOutput)}</div></div>
            <div class="stat-card"><div class="stat-title"><span class="icon-bg"><i class="fas fa-bug"></i></span> 报废最高产品</div><div class="stat-number">${maxScrapProd.name}</div><div class="stat-sub">金额 ¥${formatCurrency(maxScrapProd.actualScrap)}</div></div>
        `;
        document.getElementById('statsGrid').innerHTML = statsHtml;
    }

    // 柱状图: 各产品实际报废金额 + 报废率折线图(次坐标)
    function initBarChart() {
        const chartDom = document.getElementById('chart-bar');
        const myChart = echarts.init(chartDom);
        const categories = productsData.map(p => p.name);
        const scrapValues = productsData.map(p => p.actualScrap);
        const rateValues = productsData.map(p => p.actualRate * 100);
        const targetRates = productsData.map(p => p.targetRate * 100);
        myChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { data: ['实际报废金额 (元)', '实际报废率 (%)', '目标报废率 (%)'], left: 'left' },
            xAxis: { type: 'category', data: categories, axisLabel: { rotate: 30, fontWeight:500 } },
            yAxis: [{ type: 'value', name: '报废金额 (元)', nameLocation: 'middle', nameGap: 50 }, 
                     { type: 'value', name: '报废率 (%)', min: 0, max: 2.0, axisLabel: { formatter: '{value}%' } }],
            series: [
                { name: '实际报废金额 (元)', type: 'bar', data: scrapValues, itemStyle: { borderRadius: [6,6,0,0], color: '#5470c6' }, barWidth: '35%' },
                { name: '实际报废率 (%)', type: 'line', yAxisIndex: 1, data: rateValues, symbol: 'circle', lineStyle: { width: 3, color: '#ee6666' }, smooth: true, symbolSize: 8 },
                { name: '目标报废率 (%)', type: 'line', yAxisIndex: 1, data: targetRates, lineStyle: { width: 2, type: 'dashed', color: '#fac858' }, symbol: 'diamond' }
            ]
        });
        window.addEventListener('resize', () => myChart.resize());
    }
    
    // 缺陷原因饼图 (全车间: 根据合计缺陷数据)
    function initPieChart() {
        const defectMap = totalRow.defects;
        const pieData = Object.keys(defectMap).map(key => ({ name: key, value: defectMap[key] })).filter(item => item.value > 0);
        pieData.sort((a,b) => b.value - a.value);
        const chartDom = document.getElementById('chart-pie');
        const myChart = echarts.init(chartDom);
        myChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: ¥{c}  ({d}%)' },
            legend: { orient: 'vertical', left: 'left', top: 'center', textStyle: { fontSize: 11 } },
            series: [{ type: 'pie', radius: '55%', center: ['55%', '50%'], data: pieData, emphasis: { scale: true }, label: { show: true, formatter: '{b}', position: 'outside', fontSize: 10 }, labelLine: { length: 8 } }]
        });
        window.addEventListener('resize', () => myChart.resize());
    }

    // 报废超限预警图: 展示各产品报废率 vs 目标，超限红色高亮
    function initWarningChart() {
        const chartDom = document.getElementById('chart-warning');
        const myChart = echarts.init(chartDom);
        const categories = productsData.map(p => p.name);
        const actualRates = productsData.map(p => p.actualRate * 100);
        const targetRates = productsData.map(p => p.targetRate * 100);
        myChart.setOption({
            tooltip: { trigger: 'axis', formatter: '{b}<br/>实际报废率: {c0}% <br/>目标上限: {c1}%' },
            xAxis: { type: 'category', data: categories, axisLabel: { rotate: 30 } },
            yAxis: { type: 'value', name: '报废率 (%)', axisLabel: { formatter: '{value}%' } },
            series: [
                { name: '实际报废率', type: 'bar', data: actualRates, itemStyle: { color: (params) => params.value > targetRates[params.dataIndex] ? '#e53e3e' : '#48bb78', borderRadius: [6,6,0,0] } },
                { name: '目标报废率', type: 'line', data: targetRates, lineStyle: { width: 2, color: '#f6ad55', type: 'dashed' }, symbol: 'circle', symbolSize: 6 }
            ]
        });
        window.addEventListener('resize', () => myChart.resize());
    }

    // 缺陷明细分布（前道,碰伤,来料,钎焊,其它 前五大）总计金额
    function initDefectsBar() {
        const defectsTotal = totalRow.defects;
        const sorted = Object.entries(defectsTotal).sort((a,b) => b[1] - a[1]).slice(0,6);
        const categories = sorted.map(v => v[0]);
        const values = sorted.map(v => v[1]);
        const chartDom = document.getElementById('chart-defects');
        const myChart = echarts.init(chartDom);
        myChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: '{b}<br/>报废金额: ¥{c}' },
            xAxis: { type: 'category', data: categories, axisLabel: { rotate: 25 } },
            yAxis: { type: 'value', name: '报废损失 (元)' },
            series: [{ type: 'bar', data: values, itemStyle: { borderRadius: [6,6,0,0], color: '#3b82f6' }, label: { show: true, position: 'top', formatter: (p) => '¥'+(p.value).toFixed(0) } }]
        });
        window.addEventListener('resize', () => myChart.resize());
    }

    // 表格生成详细数据 (含缺陷比例重点展示缺陷金额)
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const allRows = [...productsData, totalRow];
        allRows.forEach(row => {
            const tr = document.createElement('tr');
            const def = row.defects;
            const fmtDef = (key) => {
                const val = def[key] || 0;
                const totalScrap = row.actualScrap;
                const percent = totalScrap > 0 ? (val / totalScrap * 100).toFixed(1) : "0.0";
                return `<span style="font-size:0.7rem;">¥${formatCurrency(val)}</span><br><span style="color:#6c757d;">${percent}%</span>`;
            };
            tr.innerHTML = `
                <td><span class="product-badge">${row.name}</span></td>
                <td>${formatCurrency(row.limit)}</td><td>${formatCurrency(row.scrapAmount)}</td><td>${formatCurrency(row.claim)}</td>
                <td><strong>${formatCurrency(row.actualScrap)}</strong></td><td>${formatCurrency(row.output)}</td>
                <td style="color:${row.actualRate > row.targetRate ? '#c2410c' : '#2b6e3b'}">${formatPercent(row.actualRate)}</td>
                <td>${formatPercent(row.targetRate)}</td>
                <td>${fmtDef('前道')}</td><td>${fmtDef('碰伤')}</td><td>${fmtDef('来料')}</td>
                <td>${fmtDef('主与扁未焊合')}</td><td>${fmtDef('钎焊')}</td><td>${fmtDef('其它')}</td>
                <td>${fmtDef('变形')}</td><td>${fmtDef('翅片掉带')}</td><td>${fmtDef('检测')}</td>
                <td>${fmtDef('火焰焊')}</td><td>${fmtDef('呛管')}</td><td>${fmtDef('错漏装')}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 整体渲染
    function initDashboard() {
        renderStats();
        initBarChart();
        initPieChart();
        initWarningChart();
        initDefectsBar();
        renderTable();
    }
    initDashboard();
</script>
</body>
</html>
