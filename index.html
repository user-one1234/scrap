<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEX车间 · 报废根因追溯看板 | 2026年5月 数据更新</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4fa;
            font-family: 'Inter', sans-serif;
            padding: 32px 28px;
            color: #1a2c3e;
        }

        .dashboard {
            max-width: 1500px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
        }

        .title-section h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #0b3552, #2a6f8f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .title-section p {
            color: #5a6f7e;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge-date {
            background: #e9f0f7;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #1d5b8e;
        }

        /* 全新KPI卡片样式 6列 */
        .kpi-grid-new {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 18px;
            margin-bottom: 32px;
        }
        @media (max-width: 1200px) {
            .kpi-grid-new { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 700px) {
            .kpi-grid-new { grid-template-columns: repeat(2, 1fr); }
        }
        .kpi-card-new {
            background: white;
            border-radius: 28px;
            padding: 20px 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
            border: 1px solid #e6edf4;
        }
        .kpi-card-new:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
            border-color: #cbdde9;
        }
        .kpi-icon-new {
            font-size: 28px;
            color: #2c6e9e;
            margin-bottom: 14px;
        }
        .kpi-label-new {
            font-size: 14px;
            font-weight: 600;
            color: #4a627a;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        .kpi-value-new {
            font-size: 32px;
            font-weight: 800;
            color: #153e5c;
            line-height: 1.2;
            margin-bottom: 6px;
            word-break: break-word;
        }
        .kpi-sub-new {
            font-size: 12px;
            color: #7e95ab;
            border-top: 1px solid #eef3fc;
            margin-top: 10px;
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
        }

        /* 两列布局 */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 16px 18px 10px 18px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid #eaf0f6;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            border-bottom: 2px solid #eef2f9;
            padding-bottom: 10px;
        }

        .chart-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1b4a6e;
        }

        .chart-header span {
            font-size: 12px;
            background: #eef2fa;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 500;
        }

        .chart-container {
            width: 100%;
            height: 340px;
        }

        /* 表格样式 */
        .insight-section {
            background: white;
            border-radius: 28px;
            padding: 8px 0 8px 0;
            border: 1px solid #eaf0f6;
            margin-bottom: 24px;
            overflow-x: auto;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 20px 0 16px 0;
            padding-left: 12px;
            border-left: 5px solid #2c7da0;
            color: #1a405b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .defect-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 900px;
        }

        .defect-table th {
            background: #f7fafd;
            padding: 14px 12px;
            font-weight: 700;
            color: #1c5679;
            border-bottom: 1px solid #e2eaf1;
            text-align: center;
        }

        .defect-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #eff3f9;
            font-weight: 500;
        }

        .defect-table tr:hover td {
            background-color: #fafcff;
        }

        .product-badge {
            background: #eef3fc;
            border-radius: 20px;
            padding: 4px 10px;
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            margin: 2px 4px;
        }

        .strength-bar {
            background: #e2e9f2;
            border-radius: 20px;
            height: 8px;
            width: 100%;
            max-width: 100px;
            margin: 0 auto;
            overflow: hidden;
        }

        .strength-fill {
            background: #e67e22;
            height: 8px;
            border-radius: 20px;
            width: 0%;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #829aaa;
            border-top: 1px solid #dfe8f0;
            padding-top: 20px;
        }

        @media (max-width: 880px) {
            body { padding: 20px 16px; }
            .two-columns { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="title-section">
            <h1><i class="fas fa-chalkboard-user" style="margin-right: 12px; color:#2c7da0;"></i>HEX车间 · 报废根因追溯 & 金额排行</h1>
            <p><i class="far fa-calendar-alt"></i> 2026年5月数据 | 基于实际报废净额 ¥501,046.41 (含索赔后) &nbsp;|&nbsp; <span class="badge-date"><i class="fas fa-chart-simple"></i> 全归因深度分析 · 最新版</span></p>
        </div>
        <div style="background: #eef3fc; border-radius: 40px; padding: 6px 18px; font-weight: 500;"><i class="fas fa-microchip"></i> 动态看板 · 根因定位</div>
    </div>

    <!-- ========= 新版KPI卡片（报废总金额原始、索赔抵扣、实际报废净额、车间综合报废率、总产出、超出目标产品数） ========= -->
    <div class="kpi-grid-new" id="newKpiContainer"></div>

    <!-- 双核心图表 -->
    <div class="two-columns">
        <div class="chart-card">
            <div class="chart-header">
                <h3><i class="fas fa-ranking-star"></i> 缺陷类别报废金额排行 (前12)</h3>
                <span>单位: 万元</span>
            </div>
            <div id="chart-defect-ranking" class="chart-container"></div>
        </div>
        <div class="chart-card">
            <div class="chart-header">
                <h3><i class="fas fa-chart-pie"></i> 缺陷类别占报废总额比例</h3>
                <span>基于实际报废净额</span>
            </div>
            <div id="chart-pie-defect" class="chart-container"></div>
        </div>
    </div>

    <!-- 根因明细表 -->
    <div class="section-title">
        <i class="fas fa-table-list"></i> 报废根因深度明细 · 影响产品矩阵
    </div>
    <div class="insight-section">
        <table class="defect-table" id="defectTable">
            <thead><tr><th>缺陷类别</th><th>总报废金额 (￥)</th><th>占报废总额比例</th><th>主要影响产品</th><th>相对强度</th></tr></thead>
            <tbody id="defectTableBody"></tbody>
        </table>
    </div>
    
    <!-- 产品报废原因覆盖明细 -->
    <div class="section-title">
        <i class="fas fa-microscope"></i> 核心产品缺陷归因 · 金额热力摘要
    </div>
    <div class="insight-section">
        <table class="defect-table" id="productReasonTable">
            <thead><tr><th>产品类别</th><th>报废总额(元)</th><th>前三大报废原因</th><th>主要风险点</th></tr></thead>
            <tbody id="productReasonBody"></tbody>
        </table>
    </div>
    <div class="footer-note">
        <i class="fas fa-chart-line"></i> 基于2026年5月车间实际报废净额及原因归集 | 索赔后净额统计 | 相对强度 = 该缺陷在该产品中金额占车间该缺陷总额比例
    </div>
</div>

<script>
    // ======================= 依据最新上传的Excel数据更新（2026年5月完整版） =======================
    // 产品原始数据: 冷凝器、油冷器、蒸发器、水箱、内冷、暖风
    // 数据字段与原始表格完全对齐: 报废金额（索赔前）、索赔、实际报废净额、产值、以及各缺陷金额
    const productsData = [
        { 
            name: "冷凝器", rawScrap: 59895.03899726222, claim: 6987.796015575468, netScrap: 52907.24298168675, output: 5145160.890730604,
            reasons: { "前道":23679.463641903738, "碰伤":3451.657440726404, "来料":6514.469714575469, "主与扁未焊合":2072.5580597264043, "钎焊":5190.196059726404, "其它":224.701729, "变形":4046.89693, "翅片掉带":294.234425575468, "检测":1538.8152013018719, "火焰焊":1330.143394575468, "呛管":0, "错漏装":992.3250969999999 }
        },
        { 
            name: "油冷器", rawScrap: 11882.8219578312, claim: 133.134486, netScrap: 11749.6874718312, output: 1610277.7080189867,
            reasons: { "前道":2584.9416918312, "碰伤":5021.093146000001, "来料":133.134486, "主与扁未焊合":199.701729, "钎焊":586.593658, "其它":23124.859812019044, "变形":1372.8890450000004, "翅片掉带":736.7175050000001, "检测":673.691626, "火焰焊":282.790099, "呛管":0, "错漏装":66.567243 }
        },
        { 
            name: "蒸发器", rawScrap: 281672.6752746176, claim: 22149.481355551674, netScrap: 259523.19391906593, output: 22565190.501041405,
            reasons: { "前道":112062.40413656783, "碰伤":18832.296190974797, "来料":25126.198715539067, "主与扁未焊合":25496.514995779038, "钎焊":38036.213082562295, "其它":3102.1669909999996, "变形":3401.3072498779034, "翅片掉带":3140.5936135810684, "检测":7348.617757991606, "火焰焊":9735.754578223183, "呛管":61.891302, "错漏装":15306.023839503216 }
        },
        { 
            name: "水箱", rawScrap: 53397.58261135007, claim: 627.768231, netScrap: 52769.81438035007, output: 3232442.7812559614,
            reasons: { "前道":44576.20236435001, "碰伤":1436.905732, "来料":0, "主与扁未焊合":1403.16403, "钎焊":98.117078, "其它":3969.573316114152, "变形":369.423564, "翅片掉带":218.64179, "检测":1748.4651679999997, "火焰焊":0, "呛管":0, "错漏装":444.495894 }
        },
        { 
            name: "内冷", rawScrap: 83694.3167613776, claim: 9043.805466255702, netScrap: 74650.5112951219, output: 6042495.864848009,
            reasons: { "前道":37093.65141959223, "碰伤":8409.74273268493, "来料":9175.358518470315, "主与扁未焊合":4231.245981077622, "钎焊":6510.692457086755, "其它":3255.295695372216, "变形":308.1162900365295, "翅片掉带":710.572152073059, "检测":2616.5574148949772, "火焰焊":9511.770489022821, "呛管":0, "错漏装":1103.6806467168947 }
        },
        { 
            name: "暖风", rawScrap: 49445.9621598092, claim: 0, netScrap: 49445.9621598092, output: 3688449.86904984,
            reasons: { "前道":28263.18920807332, "碰伤":2757.910630058323, "来料":198.48978100000002, "主与扁未焊合":8889.071406663841, "钎焊":3694.4721628971374, "其它":0, "变形":148.30077000000003, "翅片掉带":404.93226999999996, "检测":609.4159053722165, "火焰焊":992.8028016861082, "呛管":64.2321576861082, "错漏装":167.849371 }
        }
    ];

    // 合计值 (依据最新excel合计行)
    const totalRawScrap = 539988.397762248;       // 报废总金额原始
    const totalClaim = 38941.985554382845;        // 索赔总额
    const totalNetScrap = 501046.41220786504;     // 实际报废净额
    const totalOutput = 46568053.458155885;       // 总产值
    const totalActualRate = totalNetScrap / totalOutput;  // 0.010759445
    const targetOverall = 0.0095;                 // 总目标0.95%
    const overallRatePercent = (totalActualRate * 100).toFixed(3);
    const isOverTarget = totalActualRate > targetOverall;

    // 计算超出目标产品数 (基于各产品实际报废率 vs 目标率)
    const productTargetMap = { "冷凝器":0.01, "油冷器":0.007, "蒸发器":0.01, "水箱":0.012, "内冷":0.006, "暖风":0.01 };
    let overTargetCount = 0;
    productsData.forEach(p => {
        let actualRateProd = p.netScrap / p.output;
        let targetRateProd = productTargetMap[p.name];
        if(actualRateProd > targetRateProd) overTargetCount++;
    });

    // 新版KPI数据卡片
    const kpiNewData = [
        { icon: "fa-file-invoice-dollar", label: "报废总金额（原始）", value: "¥" + totalRawScrap.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ","), sub: "含未索赔部分" },
        { icon: "fa-hand-holding-usd", label: "索赔抵扣金额", value: "¥" + totalClaim.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ","), sub: "质量索赔收益" },
        { icon: "fa-chart-line", label: "实际报废净额", value: "¥" + totalNetScrap.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ","), sub: "最终承担成本" },
        { icon: "fa-percent", label: "车间综合报废率", value: overallRatePercent + "%", sub: `目标${(targetOverall*100).toFixed(2)}% ${isOverTarget ? '↑超出目标' : '↓达标'}` },
        { icon: "fa-industry", label: "总产出（产值）", value: "¥" + (totalOutput / 10000).toFixed(2) + "万", sub: `报废占比${((totalNetScrap/totalOutput)*100).toFixed(2)}%` },
        { icon: "fa-triangle-exclamation", label: "超出目标产品数", value: `${overTargetCount} / 6`, sub: "需重点关注" }
    ];

    const newKpiContainer = document.getElementById("newKpiContainer");
    function renderNewKPI() {
        newKpiContainer.innerHTML = "";
        kpiNewData.forEach(k => {
            const card = document.createElement("div");
            card.className = "kpi-card-new";
            card.innerHTML = `
                <div class="kpi-icon-new"><i class="fas ${k.icon}"></i></div>
                <div class="kpi-label-new">${k.label}</div>
                <div class="kpi-value-new">${k.value}</div>
                <div class="kpi-sub-new"><span>${k.sub}</span> <i class="fas fa-info-circle" style="opacity:0.5; font-size:11px;"></i></div>
            `;
            newKpiContainer.appendChild(card);
        });
    }
    renderNewKPI();

    // ========== 缺陷类别统计 (12类原因，基于最新产品数据累加) ==========
    const defectKeys = ["前道", "碰伤", "来料", "主与扁未焊合", "钎焊", "其它", "变形", "翅片掉带", "检测", "火焰焊", "呛管", "错漏装"];
    let defectAmounts = {};
    defectKeys.forEach(k => defectAmounts[k] = 0);
    productsData.forEach(prod => {
        for(let [dkey, val] of Object.entries(prod.reasons)) {
            if(defectAmounts.hasOwnProperty(dkey)) defectAmounts[dkey] += val;
            else defectAmounts[dkey] = val;
        }
    });
    
    let defectArray = [];
    for(let [name, amount] of Object.entries(defectAmounts)) {
        if(amount > 0) defectArray.push({ name, amount, percent: (amount / totalNetScrap) * 100 });
    }
    defectArray.sort((a,b) => b.amount - a.amount);
    
    // 主要影响产品 & 相对强度
    const mainProductMap = {};
    const strengthMap = {};
    defectArray.forEach(def => {
        let maxAmount = 0;
        let mainProd = "";
        productsData.forEach(prod => {
            let val = prod.reasons[def.name] || 0;
            if(val > maxAmount) { maxAmount = val; mainProd = prod.name; }
        });
        mainProductMap[def.name] = mainProd;
        let strength = (maxAmount / def.amount) * 100;
        strengthMap[def.name] = Math.round(strength);
    });
    
    // 图表1: 缺陷金额排行 (万元)
    const rankChart = echarts.init(document.getElementById("chart-defect-ranking"));
    const defectNames = defectArray.map(d => d.name);
    const defectAmountsWan = defectArray.map(d => (d.amount / 10000).toFixed(2));
    rankChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, valueFormatter: (value) => '¥' + (value * 10000).toFixed(0) + ' 元' },
        grid: { left: '12%', right: '5%', containLabel: true },
        xAxis: { type: 'value', name: '金额 (万元)', nameLocation: 'middle', nameGap: 30 },
        yAxis: { type: 'category', data: defectNames, axisLabel: { fontWeight: 500, fontSize: 11 }, name: "缺陷类别" },
        series: [{
            data: defectAmountsWan, type: 'bar', barWidth: '60%', itemStyle: { borderRadius: [0, 8, 8, 0], color: '#3f8db3', label: { show: true, position: 'right', formatter: '{c} 万' } }
        }]
    });
    
    // 图表2: 缺陷占比饼图 (前8 + 其他)
    let pieData = defectArray.slice(0, 8).map(d => ({ name: d.name, value: d.amount }));
    const otherAmount = defectArray.slice(8).reduce((acc, d) => acc + d.amount, 0);
    if(otherAmount > 0) pieData.push({ name: "其他", value: otherAmount });
    const pieChart = echarts.init(document.getElementById("chart-pie-defect"));
    pieChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
        legend: { orient: 'vertical', left: 'left', textStyle: { fontSize: 11 } },
        series: [{ type: 'pie', radius: '55%', data: pieData, label: { show: true, formatter: '{b}', position: 'outside' }, emphasis: { scale: true } }]
    });
    
    // 渲染根因明细表
    const tbodyDefect = document.getElementById("defectTableBody");
    defectArray.forEach(def => {
        const row = document.createElement("tr");
        const mainProd = mainProductMap[def.name] || "多产品";
        const strengthVal = strengthMap[def.name] || 0;
        row.innerHTML = `
            <td style="font-weight:700;">${def.name}</td>
            <td>¥${def.amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}</td>
            <td>${def.percent.toFixed(2)}%</td>
            <td><span class="product-badge">${mainProd}</span> ${mainProd === "蒸发器" ? "🔥" : ""}</td>
            <td><div class="strength-bar"><div class="strength-fill" style="width: ${strengthVal}%;"></div></div> ${strengthVal}%</td>
        `;
        tbodyDefect.appendChild(row);
    });
    
    // 产品原因表格：前三大报废原因 (金额最高的三个缺陷)
    const prodReasonBody = document.getElementById("productReasonBody");
    productsData.forEach(prod => {
        let reasonsArr = [];
        for(let [rname, rval] of Object.entries(prod.reasons)) {
            if(rval > 0) reasonsArr.push({ name: rname, amount: rval });
        }
        reasonsArr.sort((a,b) => b.amount - a.amount);
        const top3 = reasonsArr.slice(0,3);
        const top3Text = top3.map(t => `${t.name} (¥${(t.amount).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")})`).join(" ; ");
        const mainRisk = top3.length ? top3[0].name : "无";
        const prodNet = prod.netScrap;
        const row = document.createElement("tr");
        row.innerHTML = `
            <td style="font-weight:700;">${prod.name}</td>
            <td>¥${prodNet.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}</td>
            <td style="text-align:left;">${top3Text || "无显著缺陷"}</td>
            <td><span class="product-badge">${mainRisk}</span> 占比突出</td>
        `;
        prodReasonBody.appendChild(row);
    });
    
    // 添加深度分析脚注 (动态TOP3缺陷说明)
    const topDefect = defectArray[0];
    const secondDefect = defectArray[1];
    const thirdDefect = defectArray[2];
    const extraNote = document.createElement("div");
    extraNote.style.marginTop = "18px";
    extraNote.style.padding = "12px 16px";
    extraNote.style.background = "#f8fbfe";
    extraNote.style.borderRadius = "20px";
    extraNote.style.fontSize = "12px";
    extraNote.style.border = "1px solid #e2ecf5";
    extraNote.innerHTML = `<i class="fas fa-chart-simple"></i> 报废根因深度分析：<strong>${topDefect?.name || ''}(¥${(topDefect?.amount || 0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}，占比${topDefect?.percent.toFixed(2) || 0}%)、${secondDefect?.name || ''}(¥${(secondDefect?.amount || 0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}，${secondDefect?.percent.toFixed(2) || 0}%)、${thirdDefect?.name || ''}(¥${(thirdDefect?.amount || 0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}，${thirdDefect?.percent.toFixed(2) || 0}%)</strong>为主要TOP3缺陷，蒸发器在前道/钎焊/主与扁未焊合缺陷中金额占比极高，需强化芯体组装及焊接工艺。`;
    
    // 将脚注添加到最后一个表格后面
    const insightSections = document.querySelectorAll(".insight-section");
    if(insightSections.length >= 2) {
        insightSections[1].insertAdjacentElement('afterend', extraNote);
    } else {
        document.querySelector(".dashboard").appendChild(extraNote);
    }
    
    // 响应式
    window.addEventListener('resize', () => {
        rankChart.resize();
        pieChart.resize();
    });
    
    // 样式优化
    const styleAdd = document.createElement('style');
    styleAdd.textContent = `
        .defect-table td:first-child, .defect-table th:first-child { background-color: #ffffff; position: sticky; left: 0; background: white; }
        .strength-bar { background: #e0e8f0; }
        .strength-fill { background: #e67e22; }
        .kpi-value-new { font-size: 28px; }
        @media (max-width: 680px) { .kpi-value-new { font-size: 22px; } }
    `;
    document.head.appendChild(styleAdd);
</script>
</body>
</html>
